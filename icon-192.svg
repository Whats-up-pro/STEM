<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0E4DA4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC107;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9800;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="url(#bgGrad)"/>
  
  <!-- UIT Shield/Book Design -->
  <g transform="translate(96, 96)">
    <!-- Book/Shield Shape -->
    <path d="M -35,-45 L 35,-45 L 35,35 Q 35,45 25,50 L 0,55 L -25,50 Q -35,45 -35,35 Z" 
          fill="white" opacity="0.95"/>
    
    <!-- UIT Text -->
    <text x="0" y="-15" 
          font-family="Arial, sans-serif" 
          font-size="24" 
          font-weight="bold" 
          fill="#0E4DA4" 
          text-anchor="middle">UIT</text>
    
    <!-- AI Focus Symbol -->
    <g transform="translate(0, 10)">
      <!-- Brain/AI Icon -->
      <circle cx="-15" cy="0" r="6" fill="url(#accentGrad)"/>
      <circle cx="15" cy="0" r="6" fill="url(#accentGrad)"/>
      <circle cx="0" cy="12" r="6" fill="url(#accentGrad)"/>
      
      <!-- Connections -->
      <line x1="-15" y1="0" x2="15" y2="0" stroke="url(#accentGrad)" stroke-width="2"/>
      <line x1="-15" y1="0" x2="0" y2="12" stroke="url(#accentGrad)" stroke-width="2"/>
      <line x1="15" y1="0" x2="0" y2="12" stroke="url(#accentGrad)" stroke-width="2"/>
    </g>
    
    <!-- Focus Eye Symbol -->
    <g transform="translate(0, -30)">
      <ellipse cx="0" cy="0" rx="12" ry="8" fill="none" stroke="#FFC107" stroke-width="2"/>
      <circle cx="0" cy="0" r="4" fill="#FFC107"/>
    </g>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="30" r="4" fill="white" opacity="0.3"/>
  <circle cx="162" cy="40" r="3" fill="white" opacity="0.2"/>
  <circle cx="160" cy="160" r="5" fill="white" opacity="0.25"/>
</svg>
