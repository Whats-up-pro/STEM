<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0E4DA4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC107;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9800;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad512)"/>
  
  <!-- Main content group -->
  <g transform="translate(256, 256)">
    <!-- Book/Shield Shape with shadow -->
    <path d="M -120,-140 L 120,-140 L 120,100 Q 120,130 80,145 L 0,165 L -80,145 Q -120,130 -120,100 Z" 
          fill="white" 
          opacity="0.98"
          filter="url(#shadow)"/>
    
    <!-- UIT Text - Larger -->
    <text x="0" y="-50" 
          font-family="Arial, sans-serif" 
          font-size="72" 
          font-weight="bold" 
          fill="#0E4DA4" 
          text-anchor="middle"
          letter-spacing="2">UIT</text>
    
    <!-- Subtitle -->
    <text x="0" y="-5" 
          font-family="Arial, sans-serif" 
          font-size="20" 
          font-weight="normal" 
          fill="#666" 
          text-anchor="middle"
          opacity="0.8">AI FOCUS</text>
    
    <!-- AI Network Symbol -->
    <g transform="translate(0, 50)">
      <!-- Nodes -->
      <circle cx="-40" cy="-15" r="14" fill="url(#accentGrad512)"/>
      <circle cx="40" cy="-15" r="14" fill="url(#accentGrad512)"/>
      <circle cx="-40" cy="30" r="14" fill="url(#accentGrad512)"/>
      <circle cx="40" cy="30" r="14" fill="url(#accentGrad512)"/>
      <circle cx="0" cy="7.5" r="14" fill="url(#accentGrad512)"/>
      
      <!-- Connections -->
      <line x1="-40" y1="-15" x2="40" y2="-15" stroke="#FFC107" stroke-width="3" opacity="0.6"/>
      <line x1="-40" y1="-15" x2="0" y2="7.5" stroke="#FFC107" stroke-width="3" opacity="0.6"/>
      <line x1="40" y1="-15" x2="0" y2="7.5" stroke="#FFC107" stroke-width="3" opacity="0.6"/>
      <line x1="-40" y1="30" x2="0" y2="7.5" stroke="#FFC107" stroke-width="3" opacity="0.6"/>
      <line x1="40" y1="30" x2="0" y2="7.5" stroke="#FFC107" stroke-width="3" opacity="0.6"/>
      <line x1="-40" y1="30" x2="40" y2="30" stroke="#FFC107" stroke-width="3" opacity="0.6"/>
      
      <!-- Center highlight -->
      <circle cx="0" cy="7.5" r="6" fill="white"/>
    </g>
    
    <!-- Focus Eye Symbol at top -->
    <g transform="translate(0, -100)">
      <ellipse cx="0" cy="0" rx="35" ry="22" fill="none" stroke="#FFC107" stroke-width="4"/>
      <circle cx="0" cy="0" r="12" fill="#FFC107"/>
      <circle cx="0" cy="0" r="6" fill="white"/>
    </g>
  </g>
  
  <!-- Decorative sparkles -->
  <circle cx="80" cy="80" r="8" fill="white" opacity="0.4"/>
  <circle cx="432" cy="90" r="6" fill="white" opacity="0.3"/>
  <circle cx="420" cy="420" r="10" fill="white" opacity="0.35"/>
  <circle cx="90" cy="430" r="7" fill="white" opacity="0.3"/>
  
  <!-- Corner accents -->
  <path d="M 60,60 L 60,100 L 100,60 Z" fill="white" opacity="0.15"/>
  <path d="M 452,60 L 412,60 L 452,100 Z" fill="white" opacity="0.15"/>
</svg>
